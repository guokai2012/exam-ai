server:
  port: 8080

logging:
  level:
    root: INFO
  threshold:
    console: INFO

spring:
  application:
    name: exam-ai-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/exam_ai?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 3s
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    sql-migration-prefix: ""
  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-not-delete-value: 0
      logic-delete-value: id

app:
  permission:
    scan-delay: 600000
    scan-initial-delay: 60000
  document:
    storage-path: storage/documents
    max-size: 20MB
  ai:
    max-input-chars: 12000
  security:
    jwt-secret: "change-me-change-me-change-me-change-me-32bytes"
    access-token-ttl: 30m
    refresh-token-ttl: 14d
    captcha-ttl: 5m
    refresh-token-pepper: "change-me-refresh-token-pepper"
    refresh-cookie-name: refresh_token
    refresh-cookie-secure: false
    bootstrap-admin:
      username: admin
      password: ""
      nickname: 管理员
    rate-limits:
      captcha-ip:
        limit: 20
        window: 1m
      login-ip:
        limit: 10
        window: 1m
      login-user:
        limit: 5
        window: 1m
      refresh-ip:
        limit: 30
        window: 1m
